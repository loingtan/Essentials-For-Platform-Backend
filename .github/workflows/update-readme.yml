name: Update README Table of Contents

on:
  push:
    branches:
      - main
    paths:
      - '**.md'
      - '!README.md'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Regenerate README content table
        run: |
          python3 - <<'EOF'
          import os, re
          from pathlib import Path
          from collections import defaultdict

          # Collect all .md files except README.md, recursively.
          docs = []
          for root, _, files in os.walk('.'):
              parts = Path(root).parts
              if any(part.startswith('.') and part != '.' for part in parts):
                  continue
              for filename in files:
                  if not filename.endswith('.md'):
                      continue
                  path = os.path.normpath(os.path.join(root, filename))
                  rel = os.path.relpath(path, '.')
                  if rel.lower() == 'readme.md':
                      continue
                  docs.append(rel)

          docs = sorted(docs)

          def extract_description(path):
              """Return the first non-heading, non-empty paragraph line."""
              with open(path, encoding='utf-8') as fh:
                  for line in fh:
                      line = line.strip()
                      if line and not line.startswith('#') and not line.startswith('---'):
                          # Strip markdown link syntax for a clean description
                          clean = re.sub(r'\[([^\]]+)\]\([^)]+\)', r'\1', line)
                          # Truncate long descriptions
                          return clean[:120] + ('…' if len(clean) > 120 else '')
              return ''

          def make_title(filename):
              """Convert a filename like foo_bar.md to a readable title."""
              name = os.path.splitext(os.path.basename(filename))[0]
              return name.replace('_', ' ').replace('-', ' ').title()

          grouped_docs = defaultdict(list)
          for doc in docs:
              folder = os.path.dirname(doc) or '.'
              grouped_docs[folder].append(doc)

          def make_context_label(folder):
              if folder == '.':
                  return 'Root'
              parts = [p.replace('_', ' ').replace('-', ' ').title() for p in Path(os.path.normpath(folder)).parts]
              return ' / '.join(parts)

          sections = []
          for folder in sorted(grouped_docs):
              context = make_context_label(folder)
              rows = []
              for doc in grouped_docs[folder]:
                  title = make_title(doc)
                  desc  = extract_description(doc)
                  rows.append(f'| [{title}]({doc}) | {desc} |')
              section = (
                  f'#### {context}\n\n'
                  '| Guide | Description |\n'
                  '|-------|-------------|\n' +
                  '\n'.join(rows)
              )
              sections.append(section)

          table = '\n\n'.join(sections)

          with open('README.md', encoding='utf-8') as fh:
              content = fh.read()

          new_content = re.sub(
              r'<!-- TOC_START -->.*?<!-- TOC_END -->',
              f'<!-- TOC_START -->\n{table}\n<!-- TOC_END -->',
              content,
              flags=re.DOTALL,
          )

          with open('README.md', 'w', encoding='utf-8') as fh:
              fh.write(new_content)

          print("README.md updated successfully.")
          EOF

      - name: Commit updated README
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (
            git add README.md &&
            git commit -m "docs: auto-update README content table [skip ci]" &&
            git push
          )
